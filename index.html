<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Optimizer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <div>
      <h1>🍽 Menu Optimizer</h1>
      <p>จัดสรรเมนูให้ได้คะแนนสูงสุด ด้วย Integer Linear Programming</p>
    </div>
  </header>

  <div class="toolbar">
    <button class="btn btn-add" onclick="addIngredient()">+ วัตถุดิบ</button>
    <button class="btn btn-add" onclick="addMenu()">+ เมนู</button>
    <div class="sep"></div>
    <span class="lbl">ขอเพิ่มวัตถุดิบรวมได้ไม่เกิน</span>
    <input type="number" id="maxAdd" value="50" min="0" oninput="saveData()">
    <span class="lbl">หน่วย</span>
    <div class="sep"></div>
    <button class="btn btn-solve" id="solveBtn" onclick="solve()">▶ คำนวณ LP</button>
    <button class="btn btn-reset" onclick="resetResults()">↺ ล้างผล</button>
    <button class="btn btn-default" onclick="resetDefault()">⚠ Reset Default</button>
    <span id="solveMsg" style="font-size:.8rem;color:#64748b;"></span>
  </div>

  <div class="tbl-outer">
    <table id="mainTable"></table>
  </div>

  <div id="resultBar" style="display:none;"></div>

  <script src="defaults.js"></script>
  <script src="https://unpkg.com/javascript-lp-solver@0.4.24/prod/solver.js"></script>
  <script>
    // ── Data ────────────────────────────────────────────────────────────────────
    let ingredients = JSON.parse(JSON.stringify(DEFAULT_INGREDIENTS));
    let stock       = [...DEFAULT_STOCK];
    let menus       = JSON.parse(JSON.stringify(DEFAULT_MENUS));
    let results     = null;
    let done        = [];

    // ── Helpers ──────────────────────────────────────────────────────────────────
    const ni = () => ingredients.length;
    const nm = () => menus.length;

    function ensureRecipeLen() {
      menus.forEach(m => {
        while (m.recipe.length < ni()) m.recipe.push(0);
        m.recipe.length = ni();
      });
      while (stock.length < ni()) stock.push(0);
      stock.length = ni();
      while (done.length < nm()) done.push(0);
      done.length = nm();
    }

    function addIngredient() {
      ingredients.push({ name: 'ใหม่' });
      ensureRecipeLen();
      results = null;
      render();
    }
    function removeIngredient(i) {
      if (ni() <= 1) return;
      ingredients.splice(i, 1);
      stock.splice(i, 1);
      menus.forEach(m => m.recipe.splice(i, 1));
      results = null;
      render();
    }
    function addMenu() {
      menus.push({ name: 'เมนูใหม่', score: 40, recipe: new Array(ni()).fill(0) });
      done.push(0);
      results = null;
      render();
    }
    function removeMenu(i) {
      if (nm() <= 1) return;
      menus.splice(i, 1);
      done.splice(i, 1);
      results = null;
      render();
    }
    function resetResults() {
      results = null;
      render();
      document.getElementById('resultBar').style.display = 'none';
    }
    function resetDefault() {
      if (!confirm('รีเซ็ตข้อมูลทั้งหมดกลับเป็น default?\n(วัตถุดิบ, สูตร, และจำนวนทำแล้วจะหายทั้งหมด)')) return;
      ingredients = JSON.parse(JSON.stringify(DEFAULT_INGREDIENTS));
      stock       = [...DEFAULT_STOCK];
      menus       = JSON.parse(JSON.stringify(DEFAULT_MENUS));
      done        = new Array(DEFAULT_MENUS.length).fill(0);
      results     = null;
      document.getElementById('maxAdd').value = DEFAULT_MAX_ADD;
      localStorage.removeItem(STORAGE_KEY);
      document.getElementById('resultBar').style.display = 'none';
      document.getElementById('solveMsg').textContent = '';
      render();
    }

    // ── Render ───────────────────────────────────────────────────────────────────
    function render() {
      const t = document.getElementById('mainTable');
      const n = ni(), m = nm();
      let html = '';

      const ingCols = ingredients.map((ing, j) => `
    <th class="${j === 0 ? 'col-label' : ''}" style="${j === 0 ? 'left:130px;min-width:70px;' : ''}">
      <div style="display:flex;align-items:center;gap:3px;justify-content:center;">
        <input class="cell-in" style="width:60px;font-size:.75rem;font-weight:700;color:#fff;background:transparent;text-align:center;"
          value="${ing.name}" oninput="ingredients[${j}].name=this.value; saveData()">
        <button class="btn-del" onclick="removeIngredient(${j})" title="ลบ">✕</button>
      </div>
    </th>
  `).join('');

      html += `<tr class="col-header">
    <th class="col-label" style="min-width:130px; left:0;">รายการ</th>
    <th class="col-score" style="left:130px; min-width:80px;">คะแนน/จาน</th>
    ${ingCols}
    <th style="min-width:90px;">จำนวนทำ</th>
    <th style="min-width:90px;">ทำแล้ว</th>
  </tr>`;

      // ── วัตถุดิบ ──
      html += `<tr class="row-section-header"><td colspan="${4 + n}" style="padding:4px 10px;">📦 วัตถุดิบ</td></tr>`;

      const stockCells = ingredients.map((_, j) =>
        `<td><input class="cell-in" type="number" min="0" value="${stock[j]}"
      oninput="stock[${j}]=+this.value; results=null; saveData()"></td>`
      ).join('');
      html += `<tr class="row-stock">
    <td class="col-label"><span class="cell-ro left">คงเหลือ</span></td>
    <td class="col-score"><span class="cell-ro">—</span></td>
    ${stockCells}
    <td><span class="cell-ro">—</span></td>
    <td><span class="cell-ro">—</span></td>
  </tr>`;

      const addCells = ingredients.map((_, j) => {
        const v = results ? results.additionalReq[j] : 0;
        return `<td><span class="cell-ro ${v > 0 ? 'add-badge' : ''}">${results ? (v > 0 ? '+' + v : '0') : '—'}</span></td>`;
      }).join('');
      html += `<tr class="row-add">
    <td class="col-label"><span class="cell-ro left">ขอเพิ่ม</span></td>
    <td class="col-score"><span class="cell-ro">—</span></td>
    ${addCells}
    <td><span class="cell-ro">—</span></td>
    <td><span class="cell-ro">—</span></td>
  </tr>`;

      const availCells = ingredients.map((_, j) => {
        const v = results ? stock[j] + results.additionalReq[j] : stock[j];
        return `<td><span class="cell-ro" style="font-weight:700;">${v}</span></td>`;
      }).join('');
      html += `<tr class="row-avail">
    <td class="col-label"><span class="cell-ro left">รวมใช้ได้</span></td>
    <td class="col-score"><span class="cell-ro">—</span></td>
    ${availCells}
    <td><span class="cell-ro">—</span></td>
    <td><span class="cell-ro">—</span></td>
  </tr>`;

      // ── เมนู ──
      html += `<tr class="row-section-header"><td colspan="${4 + n}" style="padding:4px 10px;">📋 เมนูอาหาร</td></tr>`;

      menus.forEach((menu, mi) => {
        const recipeCells = ingredients.map((_, j) => {
          const v = menu.recipe[j] ?? 0;
          return `<td style="background:${v === 0 ? '#fef2f2' : '#eff6ff'};">
        <input class="cell-in ${v === 0 ? 'recipe-zero' : 'recipe-pos'}" type="number" min="0" value="${v}"
          oninput="menus[${mi}].recipe[${j}]=+this.value; results=null; saveData()">
      </td>`;
        }).join('');

        const qty = results ? results.dishCounts[mi] : null;
        const qtyCellHtml = qty !== null
          ? `<div class="${qty > 0 ? 'res-qty' : 'cell-ro res-zero'}" style="${qty > 0 ? '' : 'text-align:center;padding:5px;'}">${qty}</div>`
          : `<span class="cell-ro">—</span>`;

        html += `<tr class="row-menu">
      <td class="col-label">
        <div style="display:flex;align-items:center;gap:4px;padding:0 6px;">
          <input class="cell-in name" value="${menu.name}" oninput="menus[${mi}].name=this.value; saveData()">
          <button class="btn-del" onclick="removeMenu(${mi})" title="ลบ">✕</button>
        </div>
      </td>
      <td class="col-score">
        <input class="cell-in" type="number" min="0" value="${menu.score}"
          oninput="menus[${mi}].score=+this.value; results=null; saveData()">
      </td>
      ${recipeCells}
      <td>${qtyCellHtml}</td>
      <td><input class="cell-in" type="number" min="0" value="${done[mi] || 0}"
        oninput="done[${mi}]=+this.value; saveData(); refreshTotals()" style="background:#f0fdf4;"></td>
    </tr>`;
      });

      // ── ผลลัพธ์ ──
      if (results) {
        html += `<tr class="row-section-header"><td colspan="${4 + n}" style="padding:4px 10px;">📊 สรุปการใช้วัตถุดิบ</td></tr>`;

        const usedCells = ingredients.map((_, j) => {
          const v = results.usage[j];
          return `<td><span class="cell-ro ${v === 0 ? 'res-zero' : ''}">${v}</span></td>`;
        }).join('');
        html += `<tr class="row-used">
      <td class="col-label"><span class="cell-ro left">วัตถุดิบที่ใช้</span></td>
      <td class="col-score"><span class="cell-ro">—</span></td>
      ${usedCells}
      <td><span class="cell-ro" style="font-weight:700;text-align:center;">${results.totalDishes}</span></td>
      <td><span class="cell-ro" style="font-weight:700;text-align:center;">${done.reduce((a, b) => a + b, 0)}</span></td>
    </tr>`;

        const remainCells = ingredients.map((_, j) => {
          const avail = stock[j] + results.additionalReq[j];
          const left  = avail - results.usage[j];
          const cls   = left < 0 ? 'remain-neg' : left === 0 ? 'remain-zero' : 'remain-ok';
          return `<td class="${cls}"><span class="cell-ro">${left}</span></td>`;
        }).join('');
        html += `<tr class="row-remain">
      <td class="col-label"><span class="cell-ro left">เหลือ</span></td>
      <td class="col-score"><span class="cell-ro">—</span></td>
      ${remainCells}
      <td><span class="cell-ro" style="font-weight:700;text-align:center;">${results.totalScore.toLocaleString()}</span></td>
      <td><span class="cell-ro">—</span></td>
    </tr>`;
      }

      t.innerHTML = html;
      saveData();
    }

    // ── LP Solver ────────────────────────────────────────────────────────────────
    function solve() {
      const btn = document.getElementById('solveBtn');
      const msg = document.getElementById('solveMsg');
      btn.disabled = true;
      msg.innerHTML = '<span class="spin">⏳</span> กำลังคำนวณ...';

      setTimeout(() => {
        try {
          const maxAdd = parseInt(document.getElementById('maxAdd').value) || 0;
          const model  = { optimize: 'score', opType: 'max', constraints: {}, variables: {}, ints: {} };

          ingredients.forEach((_, j) => { model.constraints[`ing${j}`] = { max: stock[j] }; });
          if (maxAdd > 0) model.constraints['totalAdd'] = { max: maxAdd };

          menus.forEach((menu, i) => {
            const v = { score: menu.score };
            ingredients.forEach((_, j) => { if (menu.recipe[j]) v[`ing${j}`] = menu.recipe[j]; });
            model.variables[`m${i}`] = v;
            model.ints[`m${i}`] = 1;
          });

          if (maxAdd > 0) {
            ingredients.forEach((_, j) => {
              model.variables[`a${j}`] = { [`ing${j}`]: -1, totalAdd: 1 };
              model.ints[`a${j}`] = 1;
            });
          }

          if (typeof solver === 'undefined') throw new Error('โหลด solver ไม่ได้ — ตรวจสอบการเชื่อมต่อ');
          const sol = solver.Solve(model);
          if (!sol.feasible) throw new Error('ไม่มีคำตอบที่เป็นไปได้');

          const dishCounts    = menus.map((_, i) => Math.round(sol[`m${i}`] || 0));
          const additionalReq = ingredients.map((_, j) => Math.round(sol[`a${j}`] || 0));
          const usage         = ingredients.map((_, j) =>
            menus.reduce((s, menu, i) => s + (menu.recipe[j] || 0) * dishCounts[i], 0)
          );
          const totalDishes = dishCounts.reduce((a, b) => a + b, 0);
          const totalScore  = Math.round(sol.result || 0);
          const totalAdded  = additionalReq.reduce((a, b) => a + b, 0);

          results = { dishCounts, additionalReq, usage, totalDishes, totalScore, totalAdded };

          const bar = document.getElementById('resultBar');
          bar.style.display = '';
          bar.innerHTML = `<div class="result-bar">
        <div class="stat green"><div class="stat-val" id="statDishes">—</div><div class="stat-lbl">รวมจาน (LP + ทำแล้ว)</div></div>
        <div style="width:1px;height:40px;background:rgba(255,255,255,.3)"></div>
        <div class="stat yellow"><div class="stat-val" id="statScore">—</div><div class="stat-lbl">คะแนนรวม</div></div>
        <div style="width:1px;height:40px;background:rgba(255,255,255,.3)"></div>
        <div class="stat"><div class="stat-val">${totalAdded}</div><div class="stat-lbl">หน่วยที่ขอเพิ่ม / ${document.getElementById('maxAdd').value}</div></div>
        <div style="flex:1"></div>
        <div style="font-size:.8rem;opacity:.7;">✅ หาคำตอบสำเร็จ</div>
      </div>`;
          refreshTotals();

          msg.textContent = '✅ เสร็จสิ้น';
          render();
        } catch (e) {
          msg.textContent = '❌ ' + e.message;
          document.getElementById('resultBar').innerHTML = `<div class="infeasible">❌ ${e.message}</div>`;
          document.getElementById('resultBar').style.display = '';
        }
        btn.disabled = false;
      }, 30);
    }

    // ── Grand Total (LP + ทำแล้ว) ────────────────────────────────────────────────
    function refreshTotals() {
      if (!results) return;
      const doneDishes  = done.reduce((a, b) => a + b, 0);
      const doneScore   = menus.reduce((s, m, i) => s + (done[i] || 0) * m.score, 0);
      const elD = document.getElementById('statDishes');
      const elS = document.getElementById('statScore');
      if (elD) elD.textContent = (results.totalDishes + doneDishes).toLocaleString();
      if (elS) elS.textContent = (results.totalScore  + doneScore).toLocaleString();
    }

    // ── Persistence ──────────────────────────────────────────────────────────────
    const STORAGE_KEY = 'menu_optimizer_v1';

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        ingredients, stock, menus, done,
        maxAdd: document.getElementById('maxAdd').value
      }));
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const d = JSON.parse(raw);
        if (d.ingredients) ingredients = d.ingredients;
        if (d.stock)       stock       = d.stock;
        if (d.menus)       menus       = d.menus;
        if (d.done)        done        = d.done;
        if (d.maxAdd != null) document.getElementById('maxAdd').value = d.maxAdd;
      } catch (e) { /* ถ้า parse ไม่ได้ ใช้ default */ }
    }

    // ── Init ─────────────────────────────────────────────────────────────────────
    loadData();
    ensureRecipeLen();
    render();
  </script>
</body>

</html>
